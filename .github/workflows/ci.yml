name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[testing,parquet]"
          pip install ruff
      - name: Lint (ruff)
        run: |
          ruff check . --output-format=json > ruff.json || true
          ruff check .
      - name: Tests (fast, no model download)
        run: pytest -m "not slow" --cov=corpus_scrub --cov-report=xml -q
      # Slow tests require spaCy en_core_web_lg download (~400 MB) and network.
      # Run separately if a runner allows it:
      # - name: Tests (slow, NER)
      #   run: pytest -m slow -q
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
      - name: Upload ruff report
        uses: actions/upload-artifact@v4
        with:
          name: ruff-json
          path: ruff.json

  sonarcloud:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: ${{ secrets.SONAR_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarCloud necesita historial completo
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml
      - name: Download ruff report
        uses: actions/download-artifact@v4
        with:
          name: ruff-json
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
