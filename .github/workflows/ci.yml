name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[testing,parquet]"
          pip install ruff
      - name: Lint (ruff)
        run: |
          ruff check . --output-format=json > ruff.json || true
          ruff check .
      - name: Tests (fast, no model download)
        run: pytest -m "not slow" --cov=corpus_scrub --cov-report=xml -q
      # Slow tests require spaCy model downloads (~1.7 GB) and network.
      # AC-006-1/AC-006-2 (multi-idioma) FALLAN si no están instalados los
      # modelos dedicados es/de/fr_core_news_lg: caen al fallback multilingüe
      # xx_ent_wiki_sm y el test lo detecta (ver PR #9 / KI-4). Por eso los
      # pre-descargamos explícitamente antes de correr -m slow.
      - name: Download spaCy models for slow tests
        run: |
          python -m spacy download en_core_web_lg
          python -m spacy download es_core_news_lg
          python -m spacy download de_core_news_lg
          python -m spacy download fr_core_news_lg
      - name: Tests (slow, NER)
        run: pytest -m slow -q
      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
      - name: Upload ruff report
        uses: actions/upload-artifact@v4
        with:
          name: ruff-json
          path: ruff.json

  sonarcloud:
    needs: lint-and-test
    runs-on: ubuntu-latest
    if: ${{ secrets.SONAR_TOKEN != '' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # SonarCloud necesita historial completo
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Download coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml
      - name: Download ruff report
        uses: actions/download-artifact@v4
        with:
          name: ruff-json
      - name: SonarCloud Scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
