name: CI

on:
  push:
    branches: [main, feature/*]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov ruff
      - name: Lint (ruff)
        run: ruff check .
      - name: Tests (fast, no model download)
        run: pytest -m "not slow" -q
      # Slow tests require spaCy en_core_web_lg download (~400 MB) and network.
      # Run separately if a runner allows it:
      # - name: Tests (slow, NER)
      #   run: pytest -m slow -q
